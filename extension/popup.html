<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Duolingo Scraper</title>
  <script src="tailwind.js"></script>
</head>

<body class="w-[280px] bg-white text-gray-700 select-none">

  <!-- Header -->
  <div class="bg-[#1cb0f6] px-4 pt-4 pb-3">
    <div class="flex items-center gap-2">
      <span class="text-2xl leading-none">🦉</span>
      <div>
        <h1 class="text-white font-extrabold text-[15px] leading-tight tracking-tight">
          Duolingo Scraper
        </h1>
        <p class="text-blue-100 text-[11px] leading-tight opacity-80">
          duolingo.com
        </p>
      </div>
    </div>
  </div>

  <!-- Status card -->
  <div class="mx-3 mt-3 mb-2 rounded-2xl bg-gray-50 border border-gray-100 px-4 py-3 flex items-center gap-3">
    <div id="dot" class="w-3 h-3 rounded-full bg-gray-300 shrink-0 transition-colors duration-200"></div>
    <span id="statusLabel" class="text-sm font-semibold text-gray-500 flex-1">Idle</span>
    <span id="countBadge"
      class="text-xs font-bold rounded-full px-2.5 py-1 bg-gray-200 text-gray-500 transition-colors duration-200 whitespace-nowrap">
      0 requests
    </span>
  </div>

  <!-- Main actions -->
  <div class="px-3 pb-1 space-y-2">

    <button id="toggleBtn"
      class="w-full py-3 rounded-2xl text-sm font-extrabold text-white uppercase tracking-wide
             bg-[#58cc02] shadow-[0_4px_0_#46a302] active:shadow-none active:translate-y-1
             transition-all duration-100 hover:brightness-105">
      Start Capturing
    </button>

    <div class="flex gap-2">
      <button id="exportBtn" disabled
        class="flex-1 py-2.5 rounded-2xl text-sm font-bold text-white
               bg-[#1cb0f6] shadow-[0_4px_0_#1090cc] active:shadow-none active:translate-y-1
               transition-all duration-100 hover:brightness-105
               disabled:opacity-40 disabled:shadow-none disabled:cursor-default disabled:active:translate-y-0">
        Export JSON
      </button>
      <button id="clearBtn"
        class="flex-1 py-2.5 rounded-2xl text-sm font-bold text-gray-500
               bg-gray-100 shadow-[0_4px_0_#d1d5db] active:shadow-none active:translate-y-1
               transition-all duration-100 hover:bg-gray-200">
        Clear
      </button>
    </div>

  </div>

  <!-- Footer -->
  <p class="text-center text-[10px] text-gray-400 py-3">
    Captures fetch &amp; XHR on duolingo.com only
  </p>

  <script src="popup.js"></script>
</body>
</html>
